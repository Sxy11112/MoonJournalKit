name: Bug report
description: Report incorrect framing, scanning, or recovery behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: input
    attributes:
      label: Minimal input
      description: Include records, encoded bytes, or a reproducible test.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected safety property
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: input
    id: toolchain
    attributes:
      label: MoonBit toolchain and target
      placeholder: moon version; wasm, wasm-gc, js, or native
    validations:
      required: true
