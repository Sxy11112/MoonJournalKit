name: MoonJournalKit CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Check formatting
        run: moon fmt --check
      - name: Check all backends
        run: moon check --target all
      - name: Inspect publish contents
        run: moon package --list

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [wasm, wasm-gc, js]
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Test ${{ matrix.target }}
        run: moon test --target "${{ matrix.target }}"

  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Run recovery demonstration
        run: moon run cmd/main --target js
      - name: Run deterministic benchmark
        run: moon run bench/main --target js
